version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: safety-postgres-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: safety_signals_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d safety_signals_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: safety-streamlit-app
    ports:
      - "8501:8501"
    environment:
      - DB_URI=postgresql://postgres:password123@db:5432/safety_signals_db
      - OPENFDA_API_KEY=${OPENFDA_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ..:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
